# =====================================================================
# Marcel Maestro (MM) — mm-app
# TEMPLATE de configuration — ne contient aucune valeur sensible.
#
# Usage :
#   cp application-template.yml application.yml
#   # puis renseigne les variables ci-dessous dans application.yml
#   # (ou exporte-les en variables d'environnement)
#
# Variables obligatoires :
#   MM_TELEGRAM_BOT_TOKEN  : token du bot Telegram (BotFather)
#   MM_TELEGRAM_CHAT_ID    : chat id Telegram destinataire (entier)
#   OPENROUTER_API_KEY     : clé OpenRouter (provider LLM)
# =====================================================================

spring:
  application:
    name: marcel-maestro

  # Étape 8 — API REST de pilotage (ADR-017) : serveur web activé.
  main:
    web-application-type: servlet

  # E2-M1 — Virtual threads Java 21 Loom (ADR-020).
  # Spring Boot 3.2+ active automatiquement les virtual threads pour Tomcat,
  # @Async et le mmDispatcherExecutor (cf. DispatcherAutoConfiguration).
  threads:
    virtual:
      enabled: true

  # ── Étape 5 — Mémoire factuelle (SQLite, ADR-014) ──
  datasource:
    url: jdbc:sqlite:data/mm-memory.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

  ai:
    # ── Provider LLM : OpenRouter (API compatible OpenAI) ──
    # base-url sans /v1 : Spring AI ajoute /v1/chat/completions.
    openai:
      base-url: https://openrouter.ai/api
      api-key: ${OPENROUTER_API_KEY}
      chat:
        options:
          model: openai/gpt-4o-mini
    # ── Étape 6 — Client MCP passerelle VPS (désactivé tant qu'elle n'est pas branchée) ──
    mcp:
      client:
        enabled: false

logging:
  file:
    name: ./logs/console/marcel-maestro.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
      file-name-pattern: ./logs/console/marcel-maestro.%d{yyyy-MM-dd}.%i.log.gz

# ── Marcel Maestro — configuration applicative (préfixe mm.*) ──
mm:
  # Étape 6 — Outils dev locaux & passerelle VPS
  workspace:
    root: ./workspace
  vps:
    gateway:
      enabled: false

  # Étape 7 — Orchestrateur minimal
  dispatcher:
    pool-size: 4
    queue-capacity: 50

  # Agents spécialistes CLI externes
  agents:
    claude:
      binary: claude
      timeout-minutes: 30
    codex:
      binary: codex
      timeout-minutes: 30

  # Étape 8 — Pilotage & observabilité
  journal:
    base-path: ./logs/journal

  # Autonomie de Cortex face au statut "blocked" (HITL de clarification) :
  #   0  = demande très souvent (prudent)
  #   5  = équilibré (agit sur le réversible, demande sur l'important)
  #   10 = quasi autonome (ne bloque qu'en cas d'impossibilité stricte)
  # N'affecte PAS le consentement des outils risqués, toujours demandé.
  autonomy:
    level: 5

  # HITL multi-canal : "race" (Console + Telegram en parallèle) | "console" | "telegram"
  # En service sans terminal (stdin indisponible), préférer "telegram".
  hitl:
    primary-channel: race

  # E2-M5 — Génération de titre de conversation par LLM (asynchrone, ADR-025).
  # Le même ChatClient que Cortex est utilisé — aucune double configuration LLM.
  # prompt : texte envoyé au LLM avant le premier message de la conversation.
  # Laisser vide pour utiliser le prompt par défaut.
  conversation:
    title:
      prompt: "Génère un titre court (5 mots maximum) pour une conversation démarrée par ce message. Réponds uniquement avec le titre, sans ponctuation finale ni guillemets. Message : "
    brief:
      prompt: "Tu produis un brief operationnel de conversation. Reponds en francais, de facon concise et structuree. Donne : 1) objectif, 2) points decides, 3) actions/taches ouvertes, 4) risques ou zones floues. Si l'historique est trop maigre, dis-le explicitement."
      max-transcript-chars: 12000

  # E3-M1 — Prompt de base du mode conversationnel Marcel.
  # Les extensions dynamiques (ex: contexte projet) sont ajoutées par le code.
  chat:
    system-prompt: "Tu es Marcel, un assistant de développement Java et Spring. Tu réponds en français, de façon concise et directe. Tu disposes de l'outil submit_task pour déléguer une action concrète au moteur agentique Marcel en arrière-plan. Utilise submit_task quand la demande nécessite une action réelle sur le filesystem, un build Maven, ou un déploiement sur le VPS. N'utilise pas submit_task pour une simple question, une analyse de code, une discussion d'architecture ou une explication. Quand tu soumets une tâche, réponds immédiatement de façon naturelle sans attendre le résultat, en précisant que l'utilisateur recevra une notification Telegram à la fin."
    sse:
      timeout-ms: 180000

  # Côté MM : destinataire et identifiant logique du bot.
  telegram:
    bot-id: mm-bot
    chat-id: ${MM_TELEGRAM_CHAT_ID}
    ask-timeout-seconds: 300

# =====================================================================
# Telegram — module telegram-bots-mvc (asset réutilisable)
# telegram.enabled=true active l'autoconfiguration MM côté Telegram.
# Si le token n'est pas encore renseigné et que le bot ne démarre pas,
# le canal Telegram est simplement absent (démarrage non bloqué) ; au
# besoin, mettre telegram.enabled=false pour démarrer sans Telegram.
# =====================================================================
telegram:
  enabled: true
  builtin-controller-enabled: false
  default-bot-id: mm-bot
  bots:
    - id: mm-bot
      token: ${MM_TELEGRAM_BOT_TOKEN}
      polling-enabled: true
      auto-register-commands: true
      configure-menu-button: true
      security:
        allowed-user-ids:
          - ${MM_TELEGRAM_CHAT_ID}
      retry:
        enabled: true
        max-attempts: 3
        delaySeconds: 10
