# Marcel Maestro — mm-app
spring.application.name=marcel-maestro
spring.main.web-application-type=none

# ── Étape 5 — Mémoire factuelle (SQLite, ADR-014) ───────────────────
spring.datasource.url=jdbc:sqlite:data/mm-memory.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

# ── Étape 6 — Outils dev locaux & passerelle VPS ───────────────────
# Workspace root for dev local tools (read_file, write_file, read_logs, maven_build)
mm.workspace.root=./workspace

# VPS gateway (disabled by default — requires MCP server configuration)
mm.vps.gateway.enabled=false

# Disable MCP client autoconfiguration when VPS gateway is off.
# When mm.vps.gateway.enabled=true, configure spring.ai.mcp.client.*
# properties to point to the VPS MCP server.
spring.ai.mcp.client.enabled=false

# ── Étape 7 — Orchestrateur minimal ───────────────────────────────────
# Pool size for agent execution threads (default: 4)
mm.dispatcher.pool-size=4
mm.dispatcher.queue-capacity=50
