# Tests étape 5 — SQLite in-memory partagé (cache=shared évite le piège
# où chaque connexion HikariCP obtient sa propre base :memory: vide).
spring.datasource.url=jdbc:sqlite:file:testdb?mode=memory&cache=shared
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.main.web-application-type=none
mm.hitl.console.enabled=false
